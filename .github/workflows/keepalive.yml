name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Project
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/auth/v1/health")
          
          echo "Response code: $response"
          
          if [ "$response" -eq 200 ]; then
            echo "Keep-alive ping successful"
          else
            echo "Keep-alive ping failed"
            exit 1
          fi
